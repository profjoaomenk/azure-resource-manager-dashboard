version: '3.8'

services:
  azure-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - AZURE_CLI_PATH=/usr/local/bin/az
    volumes:
      - ~/.azure:/root/.azure:ro
    restart: unless-stopped
    networks:
      - fiap-network

networks:
  fiap-network:
    driver: bridge
